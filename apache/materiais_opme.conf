<VirtualHost *:80>
    ServerName bitmeback.com.br
    ServerAlias www.bitmeback.com.br
    Redirect permanent / https://bitmeback.com.br/
</VirtualHost>

<VirtualHost *:443>
    ServerName bitmeback.com.br
    ServerAlias www.bitmeback.com.br
    DocumentRoot /var/www/materiais-opme/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/bitmeback.com.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/bitmeback.com.br/privkey.pem

    <Directory /var/www/materiais-opme/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/materiais_opme_error.log
    CustomLog ${APACHE_LOG_DIR}/materiais_opme_access.log combined
</VirtualHost>
